<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsAgent — Giriş</title>
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #0b1120;
            --card: #131c31;
            --border: #243049;
            --text: #e6ecf7;
            --muted: #8291ad;
            --accent: #25d366;
            --danger: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
            background: radial-gradient(1200px 600px at 50% -10%, #16233f 0%, var(--bg) 55%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            width: 100%;
            max-width: 380px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 36px 32px;
            box-shadow: 0 24px 60px rgba(0,0,0,.45);
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }
        .brand-icon {
            width: 44px; height: 44px;
            border-radius: 12px;
            background: rgba(37,211,102,.15);
            color: var(--accent);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
        }
        .brand h1 { font-size: 18px; font-weight: 600; }
        .brand span { font-size: 12px; color: var(--muted); }
        label {
            display: block;
            font-size: 13px;
            color: var(--muted);
            margin: 16px 0 6px;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            background: #0d1526;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: border-color .15s;
        }
        input:focus { border-color: var(--accent); }
        button {
            width: 100%;
            margin-top: 24px;
            padding: 12px;
            background: var(--accent);
            color: #05230f;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .15s;
        }
        button:hover { opacity: .9; }
        .error {
            margin-top: 18px;
            padding: 10px 12px;
            background: rgba(239,68,68,.12);
            border: 1px solid rgba(239,68,68,.35);
            border-radius: 10px;
            color: #fca5a5;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>
    <form class="card" method="post" action="/login" autocomplete="off">
        <div class="brand">
            <div class="brand-icon"><i class="fa-brands fa-whatsapp"></i></div>
            <div>
                <h1>WhatsAgent</h1>
                <span>Command Center</span>
            </div>
        </div>

        <label for="username">Kullanıcı adı</label>
        <input id="username" name="username" type="text" required autofocus>

        <label for="password">Parola</label>
        <input id="password" name="password" type="password" required>

        {% if error %}
        <div class="error">
            <i class="fa-solid fa-circle-exclamation"></i><span>{{ error }}</span>
        </div>
        {% endif %}

        <button type="submit">Giriş yap</button>
    </form>
</body>
</html>
